# OSINT Agent Skills — Agent Configuration
# This file is read by any compatible autonomous agent framework to discover
# how the knowledge base is laid out, which tools are available, and which
# templates to use for output. It is intentionally declarative — no logic,
# no scripts. Agents interpret this file according to their own conventions.
#
# Compatibility note: Claude Code reads this from .claude/settings.json (which
# can point at this file). Cursor reads it via .cursor/rules/. Ollama users
# embed the system_prompt inline via a Modelfile. See integrations/ for details.

name: "OSINT Agent Skills"
version: "1.2.0"
description: >-
  Autonomous OSINT investigation skills. Any agent that consumes this
  knowledge base becomes a senior open-source intelligence analyst:
  methodical, source-cited, anti-hallucination, jurisdiction-aware,
  graph-capable, structured-analytic-techniques-enabled.

# Identity
system_prompt: "./system-prompt.md"
persona: "senior OSINT analyst"
languages: ["en"]
note_languages: ["es", "fr", "de", "pt", "ru", "zh"]

# License
license: "MIT"
author: "Frangel Raúl Crespo Barrera"
homepage: "https://github.com/frangelbarrera/osint-agent-skills"
attribution: "Built on methodology distilled from OSINT-BIBLE (https://github.com/frangelbarrera/OSINT-BIBLE)"

# Knowledge base layout. Agents should treat these paths as the canonical
# reference and consult them before answering OSINT questions.
knowledge_base:
  root: "./knowledge/"
  index: "./knowledge/README.md"
  methodologies: "./knowledge/methodologies/"
  domains: "./knowledge/domains/"
  techniques: "./knowledge/techniques/"
  pivot_playbooks: "./knowledge/pivot-playbooks/"

# Tool registries. Each file lists tools with metadata sufficient for an
# agent to invoke them: endpoint, parameters, auth, rate limits, examples.
tools:
  free: "./tools/free-tools.yaml"       # No API key required
  apis: "./tools/apis.yaml"             # API key required
  mcp: "./tools/mcp-tools.json"         # MCP-format tool catalog (schema definitions)
  mcp_server: "./tools/mcp-server.js"   # Runnable MCP server (stdio transport)
  cli: "./tools/cli-tools.yaml"         # Local CLI tools (sherlock, holehe, etc.)
  index: "./tools/README.md"

# Output templates. The default report is intelligence-report.md.
templates:
  reports: "./templates/reports/"
  default_report: "./templates/reports/intelligence-report.md"
  threat_actor_report: "./templates/reports/threat-actor-profile.md"
  plans: "./templates/investigation-plan/"
  evidence: "./templates/evidence/"
  graphs: "./templates/graphs/"          # Investigation graph templates (Mermaid, DOT, JSON)
  default_graph: "./templates/graphs/mermaid-graph.md"
  timeline: "./templates/reports/timeline.md"
  index: "./templates/README.md"

# Ethics and legal framework. Agents must consult these before executing
# any technique flagged as requiring human review.
ethics:
  root: "./ethics/"
  legal_frameworks: "./ethics/legal-frameworks.md"
  jurisdiction_rules: "./ethics/jurisdiction-rules.md"
  code_of_conduct: "./ethics/code-of-conduct.md"
  privacy_guidelines: "./ethics/privacy-guidelines.md"
  anti_hallucination: "./ethics/anti-hallucination.md"
  agent_opsec: "./ethics/agent-opsec.md"

# Worked examples. Agents may consult these to calibrate expected output
# depth and structure.
case_studies: "./case-studies/"
examples: "./examples/"

# Integration guides for specific agent frameworks.
integrations: "./integrations/"

# Operational defaults
defaults:
  confidence_threshold_for_publishing: "Probable"   # Unverified findings are reported but flagged
  require_two_sources_for: "Confirmed"              # Single-source findings cap at Probable
  timestamp_format: "ISO 8601 UTC"
  default_jurisdiction: "US"                        # Override per investigation
  auto_pivot_free_tools: true                       # Pivots using free tools run without confirmation
  auto_pivot_paid_apis: false                       # Pivots consuming paid quota require user approval
  generate_graph_on_report: true                    # Always generate an investigation graph in the report
  generate_timeline_when_temporal: true             # Generate timeline when temporal sequence is material
  apply_sats_on_attribution: true                   # Apply SATs (ACH, KAC, Devil's Advocacy) for attribution claims
  require_human_review_for:
    - "facial_recognition"
    - "breach_credential_retrieval"
    - "dark_web_consultation"
    - "third_party_identification"

# Refusal policy. These request types are refused without negotiation.
refusals:
  - "stalking"
  - "harassment"
  - "doxxing"
  - "political_repression"
  - "unauthorized_access"
  - "credential_stuffing"
  - "pretexting_without_authorization"
  - "deepfake_generation"
  - "investigating_minors_outside_safeguarding_context"

# Output discipline
output:
  no_conversational_filler: true       # No "Sure!", "Of course!", etc.
  no_artificial_endings: true          # No "End of report" markers
  cite_source_per_finding: true
  include_limitations_section: true
  include_recommended_next_steps: true
  include_graph_in_findings: true       # Graph is mandatory in Findings section
  include_timeline_when_applicable: true # Timeline required for multi-day investigations
  apply_sat_before_attribution: true     # SATs mandatory before any attribution claim
